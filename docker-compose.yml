services:
  postgres:
    image: postgres:16-alpine
    container_name: quyoshli_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: quyoshli
      POSTGRES_PASSWORD: quyoshli_dev_pass
      POSTGRES_DB: quyoshli
    ports:
      - "5433:5432"
    volumes:
      - quyoshli_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quyoshli -d quyoshli"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  quyoshli_pgdata:
